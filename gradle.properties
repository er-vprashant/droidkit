org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Maven publishing coordinates
POM_GROUP_ID=io.github.er-vprashant
POM_ARTIFACT_ID=droidkit
POM_VERSION=1.0.0

# ──────────────────────────────────────────────────────────
# Maven Central Portal + GPG signing credentials
# DO NOT put real values here — this file is committed to git.
#
# For LOCAL publishing, add to ~/.gradle/gradle.properties:
#
#   mavenCentralUsername=<token-username from central.sonatype.com>
#   mavenCentralPassword=<token-password from central.sonatype.com>
#   signing.keyId=<last 8 chars of GPG key ID>
#   signing.password=<GPG passphrase>
#   signing.secretKeyRingFile=<path to secring.gpg>
#
# For CI (GitHub Actions), set these repository secrets:
#   MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD
#   GPG_SIGNING_KEY_ID, GPG_SIGNING_KEY, GPG_SIGNING_PASSWORD
#
# Generate Central Portal token at:
#   https://central.sonatype.com → Account → Generate User Token
# ──────────────────────────────────────────────────────────
