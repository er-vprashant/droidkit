name: CI

on:
  push:
    branches: [ main, 'release/**' ]
  pull_request:
    branches: [ main, 'release/**' ]

# Cancel old runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write  # For test reporting

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for CHANGELOG check

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # Only write cache on main branch, read-only on PRs (faster, safer)
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Build library
        run: ./gradlew :droidkit:assembleDebug --no-daemon --stacktrace

      - name: Run library unit tests
        run: ./gradlew :droidkit:testDebugUnitTest --no-daemon --stacktrace

      - name: Run lint
        run: ./gradlew :droidkit:lintDebug --no-daemon --stacktrace

      - name: Build sample app
        run: ./gradlew :sample:assembleDebug --no-daemon --stacktrace

      - name: Run sample app tests
        run: ./gradlew :sample:testDebugUnitTest --no-daemon --stacktrace

      # Upload artifacts for inspection
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            droidkit/build/outputs/aar/
            sample/build/outputs/apk/
            droidkit/build/reports/lint-results-debug.html
          retention-days: 7

      # Publish test results to PR
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/build/test-results/**/*.xml'
          check_name: Test Results
          comment_mode: off  # Don't spam PR comments

      # Upload lint results as code scanning alerts
      - name: Upload lint SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: droidkit/build/reports/lint-results-debug.sarif
        continue-on-error: true  # Don't fail if SARIF not generated

      # Check CHANGELOG updated on PRs
      - name: Check CHANGELOG updated
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "CHANGELOG.md"; then
            echo "::warning::⚠️ CHANGELOG.md was not updated. Consider adding an entry for your changes."
          else
            echo "✅ CHANGELOG.md was updated"
          fi

      # Validate version on release branches
      - name: Validate version bump
        if: startsWith(github.ref, 'refs/heads/release/')
        run: |
          VERSION=$(grep "VERSION_NAME=" gradle.properties | cut -d'=' -f2)
          BRANCH_VERSION="${GITHUB_REF#refs/heads/release/}"
          if [ "$VERSION" != "$BRANCH_VERSION" ]; then
            echo "::error::Version mismatch: gradle.properties has VERSION_NAME=$VERSION but branch is release/$BRANCH_VERSION"
            exit 1
          fi
          echo "✅ Version $VERSION matches release branch"
