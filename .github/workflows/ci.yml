name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build library
        run: ./gradlew :droidkit:assembleDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew :droidkit:testDebugUnitTest --no-daemon

      - name: Build sample app
        run: ./gradlew :sample:assembleDebug --no-daemon
